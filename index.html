<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A MAZE ZING!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #000;
            font-family: 'Press Start 2P', Arial, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Optimized ASCII Background */
        #ascii-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            font-family: monospace;
            font-size: 10px;
            line-height: 1;
            color: #00ffcc;
            opacity: 0.08;
            white-space: pre;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            animation: asciiDrift 60s linear infinite;
            text-shadow: 0 0 6px #00ffff;
        }

        @keyframes asciiDrift {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(-120px, -80px); }
        }

        h1 {
            font-size: 52px;
            margin: 10px 0 20px;
            z-index: 5;
            text-shadow: 0 0 15px #ff00ff, 0 0 30px #00ffff, 0 0 50px #ffff00;
            animation: titleGlow 1.8s ease-in-out infinite alternate, rainbowShift 5s linear infinite;
        }

        @keyframes titleGlow { from { text-shadow: 0 0 15px #ff00ff, 0 0 30px #00ffff; } to { text-shadow: 0 0 35px #ff00ff, 0 0 60px #00ffff, 0 0 80px #ffff00; } }
        @keyframes rainbowShift {
            0% { color: #ff00ff; } 25% { color: #00ffff; } 50% { color: #ffff00; } 75% { color: #00ff88; } 100% { color: #ff00ff; }
        }

        canvas {
            border: 6px solid #ff00ff;
            image-rendering: pixelated;
            background: #0a001f;
            box-shadow: 0 0 40px #ff00ff, 0 0 70px #00ffff;
            z-index: 3;
            animation: canvasPulse 4s ease-in-out infinite;
        }

        @keyframes canvasPulse {
            0%,100% { box-shadow: 0 0 40px #ff00ff, 0 0 70px #00ffff; }
            50% { box-shadow: 0 0 60px #ffff00, 0 0 90px #ff00ff; }
        }

        #hud, #controls { z-index: 4; }
    </style>
</head>
<body>

    <!-- Much smaller, repeating ASCII background -->
    <pre id="ascii-bg">
    </pre>

    <h1>A MAZE ZING!</h1>
    
    <div id="hud">
        <div class="stat">Time: <span id="timer">0.0</span>s</div>
        <div class="stat">Best: <span id="best">—</span>s</div>
        <div class="stat">Completed: <span id="completed">0</span></div>
    </div>

    <div style="margin-bottom:12px; z-index:3;">
        <label style="display:flex; align-items:center; gap:10px; font-size:18px; cursor:pointer;">
            <input type="checkbox" id="aiCheckbox" onchange="toggleAI()"> 
            <strong>🤖 RACE vs AI</strong>
        </label>
        <button onclick="resetGame()" style="margin:0 10px;">NEW MAZE</button>
        <button onclick="showStats()">📊 STATS</button>
    </div>

    <canvas id="game" width="600" height="480"></canvas>

    <script>
        // === ASCII Background Generator (much lighter) ===
        const asciiArt = `
██████████████████████████████████
█░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░█
█░█░█░█░█░█░█░█░█░█░█░█░█░█░█░█░█
█░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░█
██████████████████████████████████
        `.repeat(8);

        document.getElementById('ascii-bg').textContent = asciiArt;

        // === GAME CODE (unchanged, solid version) ===
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const CELL_SIZE = 24;
        const COLS = 25;
        const ROWS = 20;
        
        let maze = [], player = {x:0,y:0}, exit = {x:0,y:0};
        let gameWon = false, aiWon = false;
        let startTime = 0, timerInterval = null;
        let bestTime = localStorage.getItem('mazeBestTime') ? parseFloat(localStorage.getItem('mazeBestTime')) : Infinity;
        let totalCompleted = parseInt(localStorage.getItem('mazeTotalCompleted') || '0');
        let aiEnabled = localStorage.getItem('mazeAIEnabled') === 'true';
        let aiPath = [], aiPos = {x:0,y:0}, aiIndex = 0, aiInterval = null;

        function updateHUD() {
            document.getElementById('best').textContent = bestTime === Infinity ? '—' : bestTime.toFixed(1);
            document.getElementById('completed').textContent = totalCompleted;
            document.getElementById('aiCheckbox').checked = aiEnabled;
        }

        function startTimer() {
            startTime = Date.now();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameWon || aiWon) return;
                document.getElementById('timer').textContent = ((Date.now() - startTime)/1000).toFixed(1);
            }, 50);
        }

        function stopTimer() { clearInterval(timerInterval); return (Date.now() - startTime) / 1000; }

        function findShortestPath(sx, sy, ex, ey) {
            const visited = Array.from({length: ROWS}, () => Array(COLS).fill(false));
            const queue = [{x: sx, y: sy, path: [{x:sx, y:sy}]}];
            visited[sy][sx] = true;
            const dirs = [[0,-1],[1,0],[0,1],[-1,0]];

            while (queue.length) {
                const {x, y, path} = queue.shift();
                if (x === ex && y === ey) return path;
                for (let [dx, dy] of dirs) {
                    const nx = x + dx, ny = y + dy;
                    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && maze[ny][nx] === 0 && !visited[ny][nx]) {
                        visited[ny][nx] = true;
                        queue.push({x:nx, y:ny, path: [...path, {x:nx, y:ny}]});
                    }
                }
            }
            return [];
        }

        function generateMaze() {
            let attempts = 0;
            do {
                maze = Array(ROWS).fill().map(() => Array(COLS).fill(1));
                const startX = 1, startY = 1;
                player.x = startX; player.y = startY;

                function carve(x, y) {
                    maze[y][x] = 0;
                    const dirs = [[0,-2],[2,0],[0,2],[-2,0]].sort(() => Math.random() - 0.5);
                    for (let [dx, dy] of dirs) {
                        const nx = x + dx, ny = y + dy;
                        if (nx > 0 && nx < COLS-1 && ny > 0 && ny < ROWS-1 && maze[ny][nx] === 1) {
                            maze[y + Math.floor(dy/2)][x + Math.floor(dx/2)] = 0;
                            carve(nx, ny);
                        }
                    }
                }
                carve(startX, startY);

                // Clear paths
                for (let i = -1; i <= 2; i++) for (let j = -1; j <= 2; j++) {
                    if (player.x + i >= 0 && player.x + i < COLS && player.y + j >= 0 && player.y + j < ROWS)
                        maze[player.y + j][player.x + i] = 0;
                }

                exit.x = COLS - 2; exit.y = ROWS - 2;
                maze[exit.y][exit.x] = 0;
                for (let i = 0; i <= 7; i++) {
                    maze[ROWS - 1 - i][COLS - 2] = 0;
                    maze[ROWS - 2][COLS - 1 - i] = 0;
                }

                attempts++;
            } while (findShortestPath(player.x, player.y, exit.x, exit.y).length === 0 && attempts < 30);

            aiPath = findShortestPath(player.x, player.y, exit.x, exit.y);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    ctx.fillStyle = maze[y][x] === 1 ? '#660066' : '#0a001f';
                    ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                }
            }
            ctx.fillStyle = '#00ff88';
            ctx.fillRect(exit.x * CELL_SIZE + 4, exit.y * CELL_SIZE + 4, CELL_SIZE-8, CELL_SIZE-8);

            // Player
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.arc(player.x * CELL_SIZE + CELL_SIZE/2, player.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 4, 0, Math.PI*2);
            ctx.fill();

            // AI
            if (aiEnabled && aiPath.length > 0) {
                ctx.fillStyle = '#ff0088';
                ctx.beginPath();
                ctx.arc(aiPos.x * CELL_SIZE + CELL_SIZE/2, aiPos.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 4, 0, Math.PI*2);
                ctx.fill();
            }

            if (gameWon || aiWon) {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.textAlign = 'center';
                ctx.font = 'bold 48px "Press Start 2P"';
                ctx.fillStyle = gameWon ? '#00ff88' : '#ff0088';
                ctx.fillText(gameWon ? 'AMAZING!' : 'AI WINS', canvas.width/2, canvas.height/2);
            }
        }

        function movePlayer(dx, dy) {
            if (gameWon || aiWon) return;
            const nx = player.x + dx, ny = player.y + dy;
            if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || maze[ny][nx] === 1) return;
            player.x = nx; player.y = ny;
            if (player.x === exit.x && player.y === exit.y) {
                gameWon = true;
                const time = stopTimer();
                clearInterval(aiInterval);
                if (time < bestTime) bestTime = time;
                totalCompleted++;
                localStorage.setItem('mazeBestTime', bestTime);
                localStorage.setItem('mazeTotalCompleted', totalCompleted);
            }
            draw();
        }

        function startAI() {
            if (!aiEnabled || aiPath.length < 2) return;
            clearInterval(aiInterval);
            aiIndex = 0;
            aiPos = {...aiPath[0]};
            aiInterval = setInterval(() => {
                if (gameWon || aiWon || aiIndex >= aiPath.length - 1) return;
                aiIndex++;
                aiPos = aiPath[aiIndex];
                draw();
                if (aiPos.x === exit.x && aiPos.y === exit.y) {
                    aiWon = true;
                    stopTimer();
                    draw();
                }
            }, 135);
        }

        function resetGame() {
            gameWon = false; aiWon = false;
            generateMaze();
            startTimer();
            if (aiEnabled) startAI();
            draw();
        }

        function toggleAI() {
            aiEnabled = document.getElementById('aiCheckbox').checked;
            localStorage.setItem('mazeAIEnabled', aiEnabled);
            resetGame();
        }

        function showStats() {
            alert(`A MAZE ZING!\n\nCompleted: ${totalCompleted}\nBest Time: ${bestTime === Infinity ? '—' : bestTime.toFixed(1)}s`);
        }

        window.addEventListener('keydown', e => {
            switch (e.key.toLowerCase()) {
                case 'arrowup': case 'w': movePlayer(0,-1); break;
                case 'arrowdown': case 's': movePlayer(0,1); break;
                case 'arrowleft': case 'a': movePlayer(-1,0); break;
                case 'arrowright': case 'd': movePlayer(1,0); break;
            }
        });

        // Init
        updateHUD();
        generateMaze();
        if (aiEnabled) startAI();
        draw();
    </script>
</body>
</html>
