<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A MAZE ZING!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; background: #000;
            font-family: 'Press Start 2P', Arial, sans-serif;
            color: white; overflow: hidden;
            position: relative;
            touch-action: none;
            transform: scale(0.85);
            transform-origin: top center;
        }

        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.6; }

        h1 { font-size: 52px; margin: 8px 0 12px; z-index: 5; text-shadow: 0 0 30px #ff00ff; animation: titleGlow 2s infinite alternate; }
        @keyframes titleGlow {
            from { text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff; }
            to   { text-shadow: 0 0 40px #ff00ff, 0 0 70px #ffff00; }
        }

        canvas#game {
            border: 6px solid #ff00ff;
            image-rendering: pixelated;
            box-shadow: 0 0 60px #ff00ff;
            z-index: 2;
            background: #0a001f;
        }

        #hud { z-index: 4; display: flex; gap: 30px; margin: 12px 0; font-size: 20px; }
        .stat { background: rgba(0,0,0,0.7); padding: 10px 20px; border: 2px solid #00ffff; }

        button, label { font-family: inherit; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="bg-canvas" width="1000" height="700"></canvas>
    
    <h1>A MAZE ZING!</h1>
   
    <div id="hud">
        <div class="stat">Time: <span id="timer">0.0</span>s</div>
        <div class="stat">Best: <span id="best">—</span>s</div>
        <div class="stat">Completed: <span id="completed">0</span></div>
        <div class="stat">Level: <span id="level">1</span></div>
    </div>

    <div style="z-index:4; margin-bottom:15px;">
        <label><input type="checkbox" id="aiCheckbox" checked onchange="toggleAI()"> 🤖 ENEMY AI</label>
        <button onclick="resetGame()" style="margin-left:25px; padding:10px 20px;">NEW MAZE</button>
    </div>

    <canvas id="game" width="800" height="600"></canvas>

    <script src="game.js"></script>
</body>
</html>
