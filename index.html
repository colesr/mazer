<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A MAZE ZING!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #000;
            font-family: 'Press Start 2P', Arial, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Improved ASCII Background */
        #ascii-bg {
            position: absolute;
            top: -50px; left: -50px; right: -50px; bottom: -50px;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.1;
            color: #00ffcc;
            opacity: 0.07;
            white-space: pre;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            animation: asciiDrift 80s linear infinite;
            text-shadow: 0 0 8px #00ffff;
            user-select: none;
        }

        @keyframes asciiDrift {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(-150px, -100px); }
        }

        h1 {
            font-size: 52px;
            margin: 10px 0 15px;
            z-index: 5;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
            animation: titleGlow 1.5s ease-in-out infinite alternate, rainbowShift 6s linear infinite;
        }

        @keyframes titleGlow { from { text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff; } 
                               to   { text-shadow: 0 0 40px #ff00ff, 0 0 70px #00ffff, 0 0 90px #ffff00; } }
        @keyframes rainbowShift {
            0% { color: #ff00ff; } 25% { color: #00ffff; } 50% { color: #ffff00; } 75% { color: #00ff88; } 100% { color: #ff00ff; }
        }

        canvas {
            border: 6px solid #ff00ff;
            image-rendering: pixelated;
            background: #0a001f;
            box-shadow: 0 0 40px #ff00ff, 0 0 80px #00ffff;
            z-index: 3;
            animation: canvasPulse 4s ease-in-out infinite;
        }

        @keyframes canvasPulse {
            0%,100% { box-shadow: 0 0 40px #ff00ff, 0 0 80px #00ffff; }
            50% { box-shadow: 0 0 70px #ffff00, 0 0 100px #ff00ff; }
        }

        #hud, #controls { z-index: 4; }
        .stat { background: rgba(0,0,0,0.6); padding: 8px 16px; border: 2px solid #ff00ff; border-radius: 4px; }
    </style>
</head>
<body>

    <pre id="ascii-bg"></pre>

    <h1>A MAZE ZING!</h1>
    
    <div id="hud" style="display:flex; gap:20px; margin-bottom:10px;">
        <div class="stat">Time: <span id="timer">0.0</span>s</div>
        <div class="stat">Best: <span id="best">—</span>s</div>
        <div class="stat">Completed: <span id="completed">0</span></div>
    </div>

    <div id="controls" style="margin-bottom:15px; z-index:4;">
        <label style="display:flex; align-items:center; gap:10px; font-size:18px; cursor:pointer;">
            <input type="checkbox" id="aiCheckbox" onchange="toggleAI()"> 
            <strong>🤖 RACE vs AI</strong>
        </label>
        <button onclick="resetGame()" style="margin:0 12px; padding:10px 20px;">NEW MAZE</button>
        <button onclick="showStats()" style="padding:10px 20px;">📊 STATS</button>
    </div>

    <canvas id="game" width="600" height="480"></canvas>

    <script>
        // === Better ASCII Background ===
        const basePattern = `
▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓
▓░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░▓
▓░█░█░█░█░█░█░█░█░█░█░█░█░█░█░█░▓
▓░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░▓
▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓
        `.trim();

        let asciiContent = '';
        for (let i = 0; i < 12; i++) {
            asciiContent += basePattern + '\n\n';
        }
        document.getElementById('ascii-bg').textContent = asciiContent;

        // === GAME CODE ===
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const CELL_SIZE = 24;
        const COLS = 25;
        const ROWS = 20;
        
        let maze = [], player = {x:0,y:0}, exit = {x:0,y:0};
        let gameWon = false, aiWon = false;
        let startTime = 0, timerInterval = null;
        let bestTime = localStorage.getItem('mazeBestTime') ? parseFloat(localStorage.getItem('mazeBestTime')) : Infinity;
        let totalCompleted = parseInt(localStorage.getItem('mazeTotalCompleted') || '0');
        let aiEnabled = localStorage.getItem('mazeAIEnabled') === 'true';
        let aiPath = [], aiPos = {x:0,y:0}, aiIndex = 0, aiInterval = null;

        function updateHUD() {
            document.getElementById('best').textContent = bestTime === Infinity ? '—' : bestTime.toFixed(1);
            document.getElementById('completed').textContent = totalCompleted;
            document.getElementById('aiCheckbox').checked = aiEnabled;
        }

        function startTimer() {
            startTime = Date.now();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameWon || aiWon) return;
                document.getElementById('timer').textContent = ((Date.now() - startTime)/1000).toFixed(1);
            }, 50);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            return (Date.now() - startTime) / 1000;
        }

        function findShortestPath(sx, sy, ex, ey) {
            const visited = Array.from({length: ROWS}, () => Array(COLS).fill(false));
            const queue = [{x: sx, y: sy, path: [{x:sx, y:sy}]}];
            visited[sy][sx] = true;
            const dirs = [[0,-1],[1,0],[0,1],[-1,0]];

            while (queue.length) {
                const curr = queue.shift();
                if (curr.x === ex && curr.y === ey) return curr.path;
                for (let [dx, dy] of dirs) {
                    const nx = curr.x + dx, ny = curr.y + dy;
                    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && 
                        maze[ny][nx] === 0 && !visited[ny][nx]) {
                        visited[ny][nx] = true;
                        queue.push({x:nx, y:ny, path: [...curr.path, {x:nx, y:ny}]});
                    }
                }
            }
            return [];
        }

        function generateMaze() {
            let attempts = 0;
            do {
                maze = Array(ROWS).fill().map(() => Array(COLS).fill(1));
                player.x = 1; player.y = 1;

                function carve(x, y) {
                    maze[y][x] = 0;
                    const dirs = [[0,-2],[2,0],[0,2],[-2,0]].sort(() => Math.random() - 0.5);
                    for (let [dx, dy] of dirs) {
                        const nx = x + dx, ny = y + dy;
                        if (nx > 0 && nx < COLS-1 && ny > 0 && ny < ROWS-1 && maze[ny][nx] === 1) {
                            maze[y + Math.floor(dy/2)][x + Math.floor(dx/2)] = 0;
                            carve(nx, ny);
                        }
                    }
                }
                carve(1, 1);

                // Clear start and exit
                for (let dy = -1; dy <= 2; dy++) for (let dx = -1; dx <= 2; dx++) {
                    const x = player.x + dx, y = player.y + dy;
                    if (x >= 0 && x < COLS && y >= 0 && y < ROWS) maze[y][x] = 0;
                }

                exit.x = COLS - 2; exit.y = ROWS - 2;
                maze[exit.y][exit.x] = 0;
                for (let i = 0; i < 8; i++) {
                    maze[ROWS-1-i][COLS-2] = 0;
                    maze[ROWS-2][COLS-1-i] = 0;
                }

                attempts++;
            } while (findShortestPath(player.x, player.y, exit.x, exit.y).length === 0 && attempts < 40);

            aiPath = findShortestPath(player.x, player.y, exit.x, exit.y);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    ctx.fillStyle = maze[y][x] === 1 ? '#550055' : '#0a001f';
                    ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                }
            }

            ctx.fillStyle = '#00ff88';
            ctx.fillRect(exit.x * CELL_SIZE + 4, exit.y * CELL_SIZE + 4, CELL_SIZE-8, CELL_SIZE-8);

            // Player
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.arc(player.x*CELL_SIZE + CELL_SIZE/2, player.y*CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2-5, 0, Math.PI*2);
            ctx.fill();

            // AI
            if (aiEnabled && aiPath.length > 0) {
                ctx.fillStyle = '#ff0088';
                ctx.beginPath();
                ctx.arc(aiPos.x*CELL_SIZE + CELL_SIZE/2, aiPos.y*CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2-5, 0, Math.PI*2);
                ctx.fill();
            }

            if (gameWon || aiWon) {
                ctx.fillStyle = 'rgba(0,0,0,0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.textAlign = 'center';
                ctx.font = 'bold 48px "Press Start 2P"';
                ctx.fillStyle = gameWon ? '#00ff88' : '#ff0088';
                ctx.fillText(gameWon ? 'AMAZING!' : 'AI WINS', canvas.width/2, canvas.height/2);
            }
        }

        function movePlayer(dx, dy) {
            if (gameWon || aiWon) return;
            const nx = player.x + dx, ny = player.y + dy;
            if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || maze[ny][nx] === 1) return;
            player.x = nx; player.y = ny;
            if (player.x === exit.x && player.y === exit.y) {
                gameWon = true;
                const time = stopTimer();
                clearInterval(aiInterval);
                if (time < bestTime) bestTime = time;
                totalCompleted++;
                localStorage.setItem('mazeBestTime', bestTime);
                localStorage.setItem('mazeTotalCompleted', totalCompleted);
            }
            draw();
        }

        function startAI() {
            if (!aiEnabled || aiPath.length < 2) return;
            clearInterval(aiInterval);
            aiIndex = 0;
            aiPos = {...aiPath[0]};
            aiInterval = setInterval(() => {
                if (gameWon || aiWon || aiIndex >= aiPath.length-1) return;
                aiIndex++;
                aiPos = aiPath[aiIndex];
                draw();
                if (aiPos.x === exit.x && aiPos.y === exit.y) {
                    aiWon = true;
                    stopTimer();
                    draw();
                }
            }, 140);
        }

        function resetGame() {
            gameWon = false; aiWon = false;
            generateMaze();
            startTimer();
            if (aiEnabled) startAI();
            draw();
        }

        function toggleAI() {
            aiEnabled = document.getElementById('aiCheckbox').checked;
            localStorage.setItem('mazeAIEnabled', aiEnabled);
            resetGame();
        }

        function showStats() {
            alert(`A MAZE ZING!\n\nCompleted: ${totalCompleted}\nBest: ${bestTime === Infinity ? '—' : bestTime.toFixed(1)}s`);
        }

        window.addEventListener('keydown', e => {
            switch(e.key.toLowerCase()){
                case 'arrowup': case 'w': movePlayer(0,-1); break;
                case 'arrowdown': case 's': movePlayer(0,1); break;
                case 'arrowleft': case 'a': movePlayer(-1,0); break;
                case 'arrowright': case 'd': movePlayer(1,0); break;
            }
        });

        // Start the game
        updateHUD();
        generateMaze();
        if (aiEnabled) startAI();
        draw();
    </script>
</body>
</html>
