<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Race • Beat the AI</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; background: #1a1a1a;
            font-family: Arial, sans-serif; color: white;
        }
        canvas { border: 5px solid #ff4444; image-rendering: pixelated; background: #0f0f0f; box-shadow: 0 0 25px rgba(255,68,68,0.6); }
        #hud { display: flex; justify-content: space-between; width: 620px; margin: 15px 0 8px; font-size: 20px; gap: 12px; }
        .stat { background: #333; padding: 8px 18px; border-radius: 8px; }
        button { padding: 12px 24px; font-size: 18px; background: #ff4444; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background: #ff6666; }
        #ai-toggle { display: flex; align-items: center; gap: 8px; font-size: 18px; }
    </style>
</head>
<body>
    <h1>🔥 MAZE RACE</h1>
    <div id="hud">
        <div class="stat">Time: <span id="timer">0.0</span>s</div>
        <div class="stat">Best: <span id="best">—</span>s</div>
        <div class="stat">Completed: <span id="completed">0</span></div>
    </div>

    <div style="margin-bottom:8px;">
        <label id="ai-toggle">
            <input type="checkbox" id="aiCheckbox" onchange="toggleAI()"> 
            <strong>🤖 Race vs AI</strong>
        </label>
        <button onclick="resetGame()">New Maze</button>
        <button onclick="showStats()">📊 Stats</button>
    </div>

    <canvas id="game" width="600" height="480"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const CELL_SIZE = 24;
        const COLS = 25;
        const ROWS = 20;
        
        let maze = [], player = {x:0,y:0}, exit = {x:0,y:0};
        let gameWon = false, aiWon = false;
        let startTime = 0, timerInterval = null;
        let bestTime = localStorage.getItem('mazeBestTime') ? parseFloat(localStorage.getItem('mazeBestTime')) : Infinity;
        let totalCompleted = parseInt(localStorage.getItem('mazeTotalCompleted') || '0');
        let completionTimes = JSON.parse(localStorage.getItem('mazeRecentTimes') || '[]');
        let aiEnabled = localStorage.getItem('mazeAIEnabled') === 'true';
        
        let aiPath = [], aiPos = {x:0,y:0}, aiIndex = 0, aiInterval = null;

        function updateHUD() {
            document.getElementById('best').textContent = bestTime === Infinity ? '—' : bestTime.toFixed(1);
            document.getElementById('completed').textContent = totalCompleted;
            document.getElementById('aiCheckbox').checked = aiEnabled;
        }

        function startTimer() {
            startTime = Date.now();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameWon || aiWon) return;
                document.getElementById('timer').textContent = ((Date.now() - startTime)/1000).toFixed(1);
            }, 50);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            return (Date.now() - startTime) / 1000;
        }

        // BFS - returns shortest path or empty if unsolvable
        function findShortestPath(sx, sy, ex, ey) {
            const visited = Array.from({length: ROWS}, () => Array(COLS).fill(false));
            const queue = [{x: sx, y: sy, path: [{x:sx, y:sy}]}];
            visited[sy][sx] = true;
            const dirs = [[0,-1],[1,0],[0,1],[-1,0]];

            while (queue.length) {
                const {x, y, path} = queue.shift();
                if (x === ex && y === ey) return path;

                for (let [dx, dy] of dirs) {
                    const nx = x + dx, ny = y + dy;
                    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && 
                        maze[ny][nx] === 0 && !visited[ny][nx]) {
                        visited[ny][nx] = true;
                        queue.push({x:nx, y:ny, path: [...path, {x:nx, y:ny}]});
                    }
                }
            }
            return [];
        }

        function generateMaze() {
            let attempts = 0;
            let path = [];

            do {
                maze = Array(ROWS).fill().map(() => Array(COLS).fill(1));

                const startX = 1, startY = 1;
                player.x = startX; player.y = startY;

                // DFS Carve with extra openings
                function carve(x, y) {
                    maze[y][x] = 0;
                    const dirs = [[0,-2],[2,0],[0,2],[-2,0]].sort(() => Math.random() - 0.5);
                    for (let [dx, dy] of dirs) {
                        const nx = x + dx, ny = y + dy;
                        if (nx > 0 && nx < COLS-1 && ny > 0 && ny < ROWS-1 && maze[ny][nx] === 1) {
                            maze[y + Math.floor(dy/2)][x + Math.floor(dx/2)] = 0;
                            carve(nx, ny);
                        }
                    }
                }
                carve(startX, startY);

                // Force clear start area
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        const cx = startX + dx, cy = startY + dy;
                        if (cx >= 0 && cx < COLS && cy >= 0 && cy < ROWS) maze[cy][cx] = 0;
                    }
                }

                // Place exit
                exit.x = COLS - 2; exit.y = ROWS - 2;
                maze[exit.y][exit.x] = 0;

                // Force clear exit area
                for (let i = 1; i <= 6; i++) {
                    maze[ROWS - i][COLS - 2] = 0;
                    maze[ROWS - 2][COLS - i] = 0;
                }

                path = findShortestPath(player.x, player.y, exit.x, exit.y);
                attempts++;
            } while (path.length === 0 && attempts < 30);

            // Fallback: brute force open a path if still blocked
            if (path.length === 0) {
                for (let x = 1; x < COLS-1; x++) maze[1][x] = 0;
                for (let y = 1; y < ROWS-1; y++) maze[y][COLS-2] = 0;
            }

            aiPath = findShortestPath(player.x, player.y, exit.x, exit.y);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Maze
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    ctx.fillStyle = maze[y][x] === 1 ? '#555' : '#1a1a1a';
                    ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                }
            }

            // Exit
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(exit.x * CELL_SIZE + 4, exit.y * CELL_SIZE + 4, CELL_SIZE-8, CELL_SIZE-8);

            // Player
            let px = player.x * CELL_SIZE + CELL_SIZE/2;
            let py = player.y * CELL_SIZE + CELL_SIZE/2;
            ctx.fillStyle = '#3b82f6';
            ctx.beginPath(); ctx.arc(px, py, CELL_SIZE/2 - 4, 0, Math.PI*2); ctx.fill();

            // AI
            if (aiEnabled && aiPath.length > 0) {
                let ax = aiPos.x * CELL_SIZE + CELL_SIZE/2;
                let ay = aiPos.y * CELL_SIZE + CELL_SIZE/2;
                ctx.fillStyle = '#ef4444';
                ctx.beginPath(); ctx.arc(ax, ay, CELL_SIZE/2 - 4, 0, Math.PI*2); ctx.fill();
            }

            if (gameWon || aiWon) {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.textAlign = 'center';

                if (gameWon) {
                    ctx.fillStyle = '#4ade80';
                    ctx.font = 'bold 52px Arial';
                    ctx.fillText('🎉 YOU WIN!', canvas.width/2, canvas.height/2 - 40);
                } else {
                    ctx.fillStyle = '#ef4444';
                    ctx.font = 'bold 48px Arial';
                    ctx.fillText('🤖 AI WINS!', canvas.width/2, canvas.height/2 - 40);
                }
            }
        }

        function movePlayer(dx, dy) {
            if (gameWon || aiWon) return;
            const nx = player.x + dx, ny = player.y + dy;
            if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || maze[ny][nx] === 1) return;

            player.x = nx; player.y = ny;

            if (player.x === exit.x && player.y === exit.y) {
                gameWon = true;
                const time = stopTimer();
                clearInterval(aiInterval);
                if (time < bestTime) bestTime = time;
                totalCompleted++;
                completionTimes.push(time);
                if (completionTimes.length > 20) completionTimes.shift();
                localStorage.setItem('mazeBestTime', bestTime);
                localStorage.setItem('mazeTotalCompleted', totalCompleted);
                localStorage.setItem('mazeRecentTimes', JSON.stringify(completionTimes));
                updateHUD();
            }
            draw();
        }

        function startAI() {
            if (!aiEnabled || aiPath.length < 2) return;
            clearInterval(aiInterval);
            aiIndex = 0;
            aiPos = {x: aiPath[0].x, y: aiPath[0].y};

            aiInterval = setInterval(() => {
                if (gameWon || aiWon || aiIndex >= aiPath.length - 1) return;
                aiIndex++;
                aiPos = aiPath[aiIndex];
                draw();

                if (aiPos.x === exit.x && aiPos.y === exit.y) {
                    aiWon = true;
                    stopTimer();
                    clearInterval(aiInterval);
                    draw();
                }
            }, 140); // AI speed
        }

        function resetGame() {
            gameWon = false;
            aiWon = false;
            generateMaze();
            startTimer();
            if (aiEnabled) startAI();
            draw();
        }

        function toggleAI() {
            aiEnabled = document.getElementById('aiCheckbox').checked;
            localStorage.setItem('mazeAIEnabled', aiEnabled);
            resetGame();
        }

        function showStats() { /* same as before */ alert(`Completed: ${totalCompleted}\nBest: ${bestTime.toFixed(1)}s`); }

        // Controls
        window.addEventListener('keydown', e => {
            switch (e.key.toLowerCase()) {
                case 'arrowup': case 'w': movePlayer(0,-1); break;
                case 'arrowdown': case 's': movePlayer(0,1); break;
                case 'arrowleft': case 'a': movePlayer(-1,0); break;
                case 'arrowright': case 'd': movePlayer(1,0); break;
                case 'r': if (aiWon) resetGame(); break;
            }
        });

        // Init
        updateHUD();
        generateMaze();
        if (aiEnabled) startAI();
        draw();
    </script>
</body>
</html>
