<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Maze Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #222;
            font-family: Arial, sans-serif;
            color: white;
        }
        canvas {
            border: 4px solid #ffd700;
            image-rendering: pixelated;
            background: #111;
        }
        #info {
            margin-top: 15px;
            text-align: center;
        }
        button {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 16px;
            background: #ffd700;
            color: #222;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #ffed4e;
        }
    </style>
</head>
<body>
    <h1>🌀 Maze Escape</h1>
    <canvas id="game" width="480" height="400"></canvas>
    <div id="info">
        Use <strong>ARROW KEYS</strong> or <strong>WASD</strong> to move<br>
        Reach the <span style="color:#4ade80;">GREEN</span> exit!
    </div>
    <button onclick="resetGame()">New Maze</button>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const CELL_SIZE = 40;
        const COLS = canvas.width / CELL_SIZE;  // 12
        const ROWS = canvas.height / CELL_SIZE; // 10
        
        let maze = [];
        let player = { x: 0, y: 0 };
        let exit = { x: 0, y: 0 };
        let keys = {};
        let gameWon = false;

        // Simple maze generator using DFS (Recursive Backtracker)
        function generateMaze() {
            // Initialize maze with walls
            maze = Array(ROWS).fill().map(() => Array(COLS).fill(1));
            
            // Start position
            const startX = 1;
            const startY = 1;
            player.x = startX;
            player.y = startY;
            
            // Carve path using DFS
            function carve(x, y) {
                maze[y][x] = 0;
                
                const directions = [
                    [0, -2], [2, 0], [0, 2], [-2, 0]
                ].sort(() => Math.random() - 0.5);
                
                for (let [dx, dy] of directions) {
                    const nx = x + dx;
                    const ny = y + dy;
                    
                    if (nx > 0 && nx < COLS-1 && ny > 0 && ny < ROWS-1 && maze[ny][nx] === 1) {
                        maze[y + dy/2][x + dx/2] = 0;
                        carve(nx, ny);
                    }
                }
            }
            
            carve(startX, startY);
            
            // Set exit at bottom-right area
            exit.x = COLS - 2;
            exit.y = ROWS - 2;
            maze[exit.y][exit.x] = 0;
            
            // Ensure a path to exit (simple guarantee)
            if (maze[ROWS-2][COLS-3] === 1) maze[ROWS-2][COLS-3] = 0;
            if (maze[ROWS-3][COLS-2] === 1) maze[ROWS-3][COLS-2] = 0;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw maze
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (maze[y][x] === 1) {
                        ctx.fillStyle = '#666';
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    } else {
                        ctx.fillStyle = '#222';
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    }
                }
            }
            
            // Draw exit
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(exit.x * CELL_SIZE + 5, exit.y * CELL_SIZE + 5, CELL_SIZE - 10, CELL_SIZE - 10);
            
            // Draw player
            ctx.fillStyle = '#60a5fa';
            ctx.beginPath();
            ctx.arc(
                player.x * CELL_SIZE + CELL_SIZE/2,
                player.y * CELL_SIZE + CELL_SIZE/2,
                CELL_SIZE/2 - 6,
                0, Math.PI * 2
            );
            ctx.fill();
            
            // Player highlight
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(
                player.x * CELL_SIZE + CELL_SIZE/2 - 6,
                player.y * CELL_SIZE + CELL_SIZE/2 - 8,
                5, 0, Math.PI * 2
            );
            ctx.fill();
            
            if (gameWon) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🎉 YOU WIN!', canvas.width/2, canvas.height/2 - 20);
                
                ctx.font = '24px Arial';
                ctx.fillText('Press NEW MAZE to play again', canvas.width/2, canvas.height/2 + 30);
            }
        }

        function movePlayer(dx, dy) {
            if (gameWon) return;
            
            const newX = player.x + dx;
            const newY = player.y + dy;
            
            if (newX < 0 || newX >= COLS || newY < 0 || newY >= ROWS) return;
            if (maze[newY][newX] === 1) return;
            
            player.x = newX;
            player.y = newY;
            
            // Check win
            if (player.x === exit.x && player.y === exit.y) {
                gameWon = true;
            }
            
            draw();
        }

        function handleKey(e) {
            if (keys[e.key]) return; // prevent repeat
            keys[e.key] = true;
            
            switch (e.key.toLowerCase()) {
                case 'arrowup':
                case 'w':
                    movePlayer(0, -1);
                    break;
                case 'arrowdown':
                case 's':
                    movePlayer(0, 1);
                    break;
                case 'arrowleft':
                case 'a':
                    movePlayer(-1, 0);
                    break;
                case 'arrowright':
                case 'd':
                    movePlayer(1, 0);
                    break;
            }
        }

        function resetGame() {
            gameWon = false;
            generateMaze();
            draw();
        }

        // Initialize
        function init() {
            generateMaze();
            draw();
            
            window.addEventListener('keydown', handleKey);
            window.addEventListener('keyup', (e) => {
                delete keys[e.key];
            });
            
            // Touch swipe support for mobile
            let touchStartX = 0;
            let touchStartY = 0;
            
            canvas.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            });
            
            canvas.addEventListener('touchend', e => {
                if (gameWon) return;
                const touchEndX = e.changedTouches[0].screenX;
                const touchEndY = e.changedTouches[0].screenY;
                
                const dx = touchEndX - touchStartX;
                const dy = touchEndY - touchStartY;
                
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 30) movePlayer(1, 0);
                    else if (dx < -30) movePlayer(-1, 0);
                } else {
                    if (dy > 30) movePlayer(0, 1);
                    else if (dy < -30) movePlayer(0, -1);
                }
            });
        }

        init();
    </script>
</body>
</html>
